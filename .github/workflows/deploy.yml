name: Deploy Frontend

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DEPLOY_PATH: /home/ubuntu/apps/jupjup-fe
  CONTAINER_NAME: jupjup-fe
  IMAGE_NAME: jupjup-fe
  IMAGE_TAG: latest
  IMAGE_ARCHIVE: jupjup-fe.tar.gz
  IMAGE_TAR: jupjup-fe.tar

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ARM64 Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=${{ env.IMAGE_TAR }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image
        run: gzip -c ${{ env.IMAGE_TAR }} > ${{ env.IMAGE_ARCHIVE }}

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: ${{ env.IMAGE_ARCHIVE }}
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true
          strip_components: 0

      - name: Load image and restart container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}"
            cd "${{ env.DEPLOY_PATH }}"
            sudo docker load -i "${{ env.IMAGE_ARCHIVE }}"
            sudo docker rm -f "${{ env.CONTAINER_NAME }}" || true
            sudo docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --restart unless-stopped \
              --add-host=host.docker.internal:host-gateway \
              -p 80:80 \
              "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            rm -f "${{ env.IMAGE_ARCHIVE }}"