name: Deploy Frontend

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DEPLOY_PATH: /home/ubuntu/apps/jupjup-fe
  CONTAINER_NAME: jupjup-fe
  IMAGE_NAME: jupjup-fe:latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          source: "."
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true
          strip_components: 0
          rm: false
          tar_tmp_path: /tmp
          exclude: ".git,.github,node_modules,build,.claude,AWSCLIV2.msi"

      - name: Build and restart container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}"
            cd "${{ env.DEPLOY_PATH }}"
            sudo docker build -t "${{ env.IMAGE_NAME }}" .
            sudo docker rm -f "${{ env.CONTAINER_NAME }}" || true
            sudo docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --restart unless-stopped \
              -p 80:80 \
              "${{ env.IMAGE_NAME }}"
