name: Deploy Frontend

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DEPLOY_PATH: /home/ubuntu/apps/jupjup-fe
  CONTAINER_NAME: jupjup-fe
  IMAGE_NAME: jupjup-fe
  IMAGE_TAG: latest
  IMAGE_ARCHIVE: jupjup-fe.tar.gz

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Export Docker image
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | gzip > ${{ env.IMAGE_ARCHIVE }}

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: ${{ env.IMAGE_ARCHIVE }}
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true
          strip_components: 0

      - name: Load image and restart container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}"
            cd "${{ env.DEPLOY_PATH }}"
            sudo docker load -i "${{ env.IMAGE_ARCHIVE }}"
            sudo docker rm -f "${{ env.CONTAINER_NAME }}" || true
            sudo docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --restart unless-stopped \
              -p 80:80 \
              "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            rm -f "${{ env.IMAGE_ARCHIVE }}"
